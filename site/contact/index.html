            <ul>
              <li aria-label="Location"><i class="lni lni-map-marker" aria-hidden="true"></i>

              <li aria-label="Phone number"><i class=" lni lni-phone" aria-hidden="true"></i> <a

              <li aria-label="Email address"><i class="lni lni-envelope" aria-hidden="true"></i> <a

              </li>
              <li aria-label="LinkedIn profile">

            <input type="text" id="contact-name" name="name" maxlength="500" />
            <label for="contact-email">Email address <span aria-hidden="true">*</span></label>
            <input type="email" id="contact-email" name="email" required pattern="[^@\s]+@[^@\s]+\.[^@\s]+"
              maxlength="500" />
            <label for="contact-linkedin">LinkedIn profile</label>
            <input type="text" id="contact-linkedin" name="linkedin" maxlength="500" />
            <label for="contact-message">Message</label>
            <textarea name="message" id="contact-message" rows="4" maxlength="5000"></textarea>
            <input type="hidden" name="_redirect" value="https://vickylihorst.com/success" />
            <input type="hidden" name="_error" value="https://vickylihorst.com/error" />
            <input type="hidden" name="_append" value="false" />
            <input type="hidden" name="_email.subject" value="Vicky Li Horst Product Coaching Form Submission" />
